name: Redolarium Cloud Compute Pipeline

on:
  repository_dispatch:
    types: [run_redolarium]

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hmmer prodigal diamond-aligner fasttree muscle mafft ncbi-blast+ 
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install biopython pandas requests matplotlib networkx 
          
      - name: Create Temporary Directories
        run: |
          mkdir -p workspace/input
          mkdir -p workspace/references
          mkdir -p workspace/output
          
      - name: Download Input Sequence
        env:
          QUERY_URL: ${{ github.event.client_payload.query_url }}
          QUERY_ACC: ${{ github.event.client_payload.query_acc }}
          EMAIL: ${{ github.event.client_payload.email }}
        run: |
          if [ -n "$QUERY_ACC" ]; then
            echo "Downloading query from NCBI Accession: $QUERY_ACC"
            python -c "import sys; sys.path.insert(0, 'src'); from redolarium.main import download_genbank_from_ncbi; import os; download_genbank_from_ncbi('$QUERY_ACC', '$EMAIL', 'workspace/input'); os.rename(os.path.join('workspace/input', '$QUERY_ACC.gb'), 'workspace/input/query.gbk')"
          else
            echo "Downloading query from $QUERY_URL"
            curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$QUERY_URL" -o workspace/input/query.gbk
          fi
          
      - name: Download Reference Sequences
        env:
          REF_ACC: ${{ github.event.client_payload.ref_acc }}
          EMAIL: ${{ github.event.client_payload.email }}
        run: |
          if [ -n "$REF_ACC" ]; then
            echo "Downloading references from NCBI Accessions: $REF_ACC"
            IFS=',' read -ra ADDR <<< "$REF_ACC"
            for acc in "${ADDR[@]}"; do
              # Trim whitespace
              acc=$(echo "$acc" | xargs)
              if [ -n "$acc" ]; then
                echo "Fetching $acc"
                python -c "import sys; sys.path.insert(0, 'src'); from redolarium.main import download_genbank_from_ncbi; download_genbank_from_ncbi('$acc', '$EMAIL', 'workspace/references')"
              fi
            done
          fi
          
      - name: Execute Redolarium Pipeline
        env:
          REF_ACC: ${{ github.event.client_payload.ref_acc }}
          TARGET_BGC: ${{ github.event.client_payload.target_bgc }}
          RUN_BLAST: ${{ github.event.client_payload.run_blast }}
          OPTS: ${{ github.event.client_payload.opts }}
        run: |
          export PYTHONPATH=$(pwd)/src:$PYTHONPATH
          
          CMD="python src/redolarium/main.py --query workspace/input/query.gbk --out workspace/output"
          
          if [ -n "$REF_ACC" ]; then
            CMD="$CMD --ref workspace/references"
          fi
          
          if [ "$TARGET_BGC" = "all" ]; then
            CMD="$CMD --target-bgc all"
          fi
          
          if [ "$RUN_BLAST" = "true" ]; then
            CMD="$CMD --run-blast"
          fi
          
          if [ -n "$OPTS" ]; then
            CMD="$CMD $OPTS"
          fi
          
          echo "Executing: $CMD"
          eval $CMD
          
      - name: Debloat Pipeline Results
        run: |
          echo "Removing reference genomes (local cache) to reduce artifact size..."
          rm -rf workspace/output/reference_genomes
          
      - name: Package and Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: redolarium_results_${{ github.event.client_payload.job_id }}
          path: workspace/output/
          retention-days: 7
