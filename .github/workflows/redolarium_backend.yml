name: Redolarium Cloud Compute Pipeline

on:
  repository_dispatch:
    types: [run_redolarium]

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hmmer prodigal diamond-aligner fasttree muscle mafft ncbi-blast+ 
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install biopython pandas requests matplotlib networkx 
          
      - name: Create Temporary Directories
        run: |
          mkdir -p workspace/input
          mkdir -p workspace/output
          
      - name: Download Input Sequence
        env:
          QUERY_URL: ${{ github.event.client_payload.query_url }}
        run: |
          echo "Downloading query from $QUERY_URL"
          python -c "
          import urllib.request, re, sys
          url = sys.argv[1]
          if 'tmpfiles.org' in url:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              html = urllib.request.urlopen(req).read().decode('utf-8')
              match = re.search(r'class=\"download\" href=\"([^\"]+)\"', html)
              if match:
                  url = match.group(1)
          print('Real URL:', url)
          urllib.request.urlretrieve(url, 'workspace/input/query.gbk')
          " "$QUERY_URL"
          
      - name: Execute Redolarium Pipeline
        env:
          TARGET_BGC: ${{ github.event.client_payload.target_bgc }}
          RUN_BLAST: ${{ github.event.client_payload.run_blast }}
        run: |
          export PYTHONPATH=$(pwd)/src:$PYTHONPATH
          
          CMD="python src/redolarium/main.py --query workspace/input/query.gbk --out workspace/output"
          
          if [ "$TARGET_BGC" = "all" ]; then
            CMD="$CMD --target-bgc all"
          fi
          
          if [ "$RUN_BLAST" = "true" ]; then
            CMD="$CMD --run-blast"
          fi
          
          echo "Executing: $CMD"
          eval $CMD
          
      - name: Package Results
        id: package
        run: |
          cd workspace/output
          zip -r ../../redolarium_results_${{ github.event.client_payload.job_id }}.zip .
          cd ../../
          
      - name: Upload to tmpfiles.org
        id: upload
        run: |
          RESPONSE=$(curl -s -F "file=@redolarium_results_${{ github.event.client_payload.job_id }}.zip" https://tmpfiles.org/api/v1/upload)
          echo "Response: $RESPONSE"
          URL=$(echo $RESPONSE | jq -r .data.url | sed 's/tmpfiles.org\//tmpfiles.org\/dl\//')
          echo "RESULT_URL=$URL" >> $GITHUB_ENV
          echo "Result uploaded to $URL"
          
      - name: Write Status to Jobs Branch
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch all branches to check if 'jobs' exists
          git fetch origin
          
          # Checkout or create 'jobs' branch
          if git ls-remote --exit-code --heads origin jobs; then
            git checkout jobs
          else
            git checkout --orphan jobs
            git rm -rf .
          fi
          
          # Write the result URL to the specific job file
          echo "${{ env.RESULT_URL }}" > job_${{ github.event.client_payload.job_id }}.txt
          
          # Commit and Push
          git add job_${{ github.event.client_payload.job_id }}.txt
          git commit -m "Add result for job ${{ github.event.client_payload.job_id }}"
          git push origin jobs
