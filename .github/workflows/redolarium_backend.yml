name: Redolarium Cloud Compute Pipeline

on:
  repository_dispatch:
    types: [run_redolarium]

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hmmer prodigal diamond-aligner fasttree muscle mafft ncbi-blast+ 
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install biopython pandas requests matplotlib networkx 
          
      - name: Create Temporary Directories
        run: |
          mkdir -p workspace/input
          mkdir -p workspace/output
          
      - name: Download Input Sequence
        env:
          QUERY_URL: ${{ github.event.client_payload.query_url }}
        run: |
          echo "Downloading query from $QUERY_URL"
          curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$QUERY_URL" -o workspace/input/query.gbk
          
      - name: Execute Redolarium Pipeline
        env:
          TARGET_BGC: ${{ github.event.client_payload.target_bgc }}
          RUN_BLAST: ${{ github.event.client_payload.run_blast }}
          ADV_BGC_GAP: ${{ github.event.client_payload.adv_bgc_gap }}
          ADV_BGC_FLANK: ${{ github.event.client_payload.adv_bgc_flank }}
          ADV_HGT_ZSCORE: ${{ github.event.client_payload.adv_hgt_zscore }}
          ADV_HGT_TNF_WINDOW: ${{ github.event.client_payload.adv_hgt_tnf_window }}
          ADV_PROMOTER_WINDOW: ${{ github.event.client_payload.adv_promoter_window }}
          ADV_HOMOLOGY_IDENTITY: ${{ github.event.client_payload.adv_homology_identity }}
          ADV_HOMOLOGY_EVALUE: ${{ github.event.client_payload.adv_homology_evalue }}
          ADV_CLOCK_MULTIPLIER: ${{ github.event.client_payload.adv_clock_multiplier }}
          ADV_METABOLIC_MODE: ${{ github.event.client_payload.adv_metabolic_mode }}
          ADV_CARGO_IDENTITY: ${{ github.event.client_payload.adv_cargo_identity }}
          ADV_CARGO_COVERAGE: ${{ github.event.client_payload.adv_cargo_coverage }}
          ADV_CARGO_BITSCORE: ${{ github.event.client_payload.adv_cargo_bitscore }}
        run: |
          export PYTHONPATH=$(pwd)/src:$PYTHONPATH
          
          CMD="python src/redolarium/main.py --query workspace/input/query.gbk --out workspace/output"
          
          if [ "$TARGET_BGC" = "all" ]; then
            CMD="$CMD --target-bgc all"
          fi
          
          if [ "$RUN_BLAST" = "true" ]; then
            CMD="$CMD --run-blast"
          fi
          
          if [ -n "$ADV_BGC_GAP" ]; then CMD="$CMD --adv-bgc-gap $ADV_BGC_GAP"; fi
          if [ -n "$ADV_BGC_FLANK" ]; then CMD="$CMD --adv-bgc-flank $ADV_BGC_FLANK"; fi
          if [ -n "$ADV_HGT_ZSCORE" ]; then CMD="$CMD --adv-hgt-zscore $ADV_HGT_ZSCORE"; fi
          if [ -n "$ADV_HGT_TNF_WINDOW" ]; then CMD="$CMD --adv-hgt-tnf-window $ADV_HGT_TNF_WINDOW"; fi
          if [ -n "$ADV_PROMOTER_WINDOW" ]; then CMD="$CMD --adv-promoter-window $ADV_PROMOTER_WINDOW"; fi
          if [ -n "$ADV_HOMOLOGY_IDENTITY" ]; then CMD="$CMD --adv-homology-identity $ADV_HOMOLOGY_IDENTITY"; fi
          if [ -n "$ADV_HOMOLOGY_EVALUE" ]; then CMD="$CMD --adv-homology-evalue $ADV_HOMOLOGY_EVALUE"; fi
          if [ -n "$ADV_CLOCK_MULTIPLIER" ]; then CMD="$CMD --adv-clock-multiplier $ADV_CLOCK_MULTIPLIER"; fi
          if [ -n "$ADV_METABOLIC_MODE" ]; then CMD="$CMD --adv-metabolic-mode $ADV_METABOLIC_MODE"; fi
          if [ -n "$ADV_CARGO_IDENTITY" ]; then CMD="$CMD --adv-cargo-identity $ADV_CARGO_IDENTITY"; fi
          if [ -n "$ADV_CARGO_COVERAGE" ]; then CMD="$CMD --adv-cargo-coverage $ADV_CARGO_COVERAGE"; fi
          if [ -n "$ADV_CARGO_BITSCORE" ]; then CMD="$CMD --adv-cargo-bitscore $ADV_CARGO_BITSCORE"; fi
          
          echo "Executing: $CMD"
          eval $CMD
          
      - name: Debloat Pipeline Results
        run: |
          echo "Removing reference genomes (local cache) to reduce artifact size..."
          rm -rf workspace/output/reference_genomes
          
      - name: Package and Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: redolarium_results_${{ github.event.client_payload.job_id }}
          path: workspace/output/
          retention-days: 7
